<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="login.css">
</head>

<body>

  <div class="login-container">

    <div class="login-icon">
      <img src="images/arrow (1).png">
    </div>

    <h1>Reset Password</h1>
    <p class="subtext">Enter your new password</p>

    <form id="resetForm">

      <div class="input-group">
        <label>New Password</label>
        <div class="input-wrapper">

          <input id="newPassword" type="password" placeholder="Enter new password" class="input-box icon-padding-right">

          <img src="images/eye icon.png" id="toggleNewPassword" class="input-icon-right" style="cursor:pointer;">

        </div>
      </div>

      <div class="input-group">
        <label>Confirm Password</label>
        <div class="input-wrapper">

          <input id="confirmPassword" type="password" placeholder="Confirm password"
            class="input-box icon-padding-right">

          <img src="images/eye icon.png" id="toggleConfirmPassword" class="input-icon-right" style="cursor:pointer;">

        </div>
      </div>

      <button class="login-btn">Reset Password</button>

    </form>

    <div class="footer">
      Back to <a href="login.html">Login</a>
    </div>

  </div>
  <script src="reset-password.js"></script>
</body>

</html>
