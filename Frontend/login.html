<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<!-- GOOGLE FONT -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<!-- EXTERNAL CSS -->
<link rel="stylesheet" href="login.css">

</head>
<body>

<div class="login-container">

  <div class="login-icon">
    <img src="images/arrow (1).png" class=".logo b">
  </div>

  <h1>Welcome Back</h1>
  <p class="subtext">Sign in to your trading account</p>

  <form>

    <div class="input-group">
      <label>Email</label>
      <div class="input-wrapper">
        <img src="images/envelope icon.png" class="input-icon">
        <input type="email" placeholder="Enter your email" class="input-box icon-padding">
      </div>
    </div>

    <div class="input-group">
      <label>Password</label>
      <div class="input-wrapper">
        <!-- LEFT ICON -->
        <img src="images/lock.png" class="input-icon">

        <!-- PASSWORD INPUT -->
        <input id="passwordField" type="password" placeholder="Enter your password" class="input-box icon-padding-right">

        <!-- RIGHT ICON (EYE TOGGLE) -->
        <img src="images/eye icon.png" id="togglePassword" class="input-icon-right" style="cursor:pointer;">
      </div>
    </div>

    <div class="options">
      <label><input type="checkbox"> Remember me</label>
      <a href="reset-password.html">Forgot password?</a>
    </div>
<button class="login-btn" id="loginBtn">Sign In</button>

  </form>

  <div class="divider">
    <span class="line"></span>
    <span class="text">Or continue with</span>
    <span class="line"></span>
  </div>

  <div class="social">
    <button>
      <img src="images/google.png" style="height:18px; padding-right:10px; margin-bottom:-5px;">Google
    </button>
    <button>
      <img src="images/apple.png" style="height:18px; padding-right:10px; margin-bottom:-4px;">Apple
    </button>
  </div>

  <div class="footer">
    Don't have an account? <a href="index.html#consultation">Sign up</a>
  </div>

</div>

<script src="login.js"></script>
</body>
</html>
